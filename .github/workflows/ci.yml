name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: fake-key-only-for-ci
          ANTHROPIC_API_MODEL: claude-haiku-4-5-20241022
        run: mvn test -B

      - name: Build JAR
        run: mvn package -B -DskipTests